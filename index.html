<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0f1222">
<meta name="color-scheme" content="dark">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Palabro">
<link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%238b5cf6'/><stop offset='.55' stop-color='%23f4c96b'/><stop offset='1' stop-color='%2322d3ee'/></linearGradient></defs><rect width='100' height='100' rx='22' fill='%230f1222'/><text x='50' y='70' text-anchor='middle' font-family='system-ui,Segoe UI,Roboto,sans-serif' font-size='62' font-weight='900' fill='url(%23g)'>P</text></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%238b5cf6'/><stop offset='.55' stop-color='%23f4c96b'/><stop offset='1' stop-color='%2322d3ee'/></linearGradient></defs><rect width='180' height='180' rx='40' fill='%230f1222'/><text x='90' y='125' text-anchor='middle' font-family='system-ui,Segoe UI,Roboto,sans-serif' font-size='110' font-weight='900' fill='url(%23g)'>P</text></svg>">
<title>Palabro</title>
<style>
  :root {
    --bg-0: #05060d;
    --bg-1: #0f1222;
    --surface: rgba(255, 255, 255, 0.04);
    --stroke: rgba(255, 255, 255, 0.08);
    --text: #f8fafc;
    --muted: #94a3b8;
    --accent: #f4c96b;       /* warm gold */
    --accent-2: #f59e0b;
    --accent-glow: rgba(244, 201, 107, 0.45);
    --neon-a: #8b5cf6;       /* violet */
    --neon-b: #22d3ee;       /* cyan */
    --green: #22c55e;
    --green-2: #16a34a;
    --yellow: #eab308;
    --yellow-2: #ca8a04;
    --danger: #f87171;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    background:
      radial-gradient(1200px 800px at 15% -10%, rgba(139, 92, 246, 0.22), transparent 60%),
      radial-gradient(1000px 700px at 110% 110%, rgba(34, 211, 238, 0.18), transparent 55%),
      linear-gradient(180deg, var(--bg-1) 0%, var(--bg-0) 100%);
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: max(12px, env(safe-area-inset-top))
            max(12px, env(safe-area-inset-right))
            max(12px, env(safe-area-inset-bottom))
            max(12px, env(safe-area-inset-left));
    overflow: hidden;
    overscroll-behavior: none;
    -webkit-font-smoothing: antialiased;
  }
  .app {
    max-width: 1000px;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }
  h1 {
    font-size: clamp(1.8rem, 4vw, 2.6rem);
    font-weight: 900;
    letter-spacing: 0.32em;
    background: linear-gradient(135deg, var(--neon-a) 0%, var(--accent) 50%, var(--neon-b) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    filter: drop-shadow(0 2px 12px rgba(139, 92, 246, 0.35));
    margin: 0;
  }
  .status {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    gap: 12px;
  }
  .timer {
    font-size: clamp(1.4rem, 2.6vw, 2rem);
    font-family: 'SF Mono', ui-monospace, 'JetBrains Mono', Menlo, monospace;
    font-weight: 700;
    color: var(--text);
    background: var(--surface);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    padding: 8px 20px;
    border-radius: 14px;
    border: 1px solid var(--stroke);
    min-width: 130px;
    letter-spacing: 0.06em;
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.06);
  }
  .timer.warning { color: var(--accent); border-color: rgba(244, 201, 107, 0.4); }
  .timer.danger {
    color: var(--danger);
    border-color: rgba(248, 113, 113, 0.5);
    animation: pulse 1s infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
  .btn {
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
    color: #241a05;
    border: none;
    padding: 10px 22px;
    font-size: 1rem;
    font-weight: 700;
    font-family: inherit;
    border-radius: 14px;
    cursor: pointer;
    letter-spacing: 0.04em;
    box-shadow:
      0 8px 22px rgba(244, 201, 107, 0.32),
      inset 0 1px 0 rgba(255, 255, 255, 0.45);
    transition: transform 0.12s ease, box-shadow 0.15s ease, filter 0.12s ease;
  }
  .btn:hover {
    filter: brightness(1.08);
    box-shadow: 0 10px 28px rgba(244, 201, 107, 0.45), inset 0 1px 0 rgba(255, 255, 255, 0.5);
  }
  .btn:active { transform: translateY(1px) scale(0.98); }
  .status .controls {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .icon-btn {
    padding: 0;
    width: 44px;
    height: 44px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--stroke);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    box-shadow: 0 6px 18px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255,255,255,0.06);
  }
  .icon-btn:hover { filter: brightness(1.2); box-shadow: 0 8px 22px rgba(0, 0, 0, 0.4); }
  .icon-btn svg { display: block; }

  .board {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap: 10px;
    padding: 18px;
    background:
      linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01)),
      rgba(12, 16, 32, 0.65);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid var(--stroke);
    border-radius: 22px;
    box-shadow:
      0 30px 60px rgba(0, 0, 0, 0.55),
      inset 0 1px 0 rgba(255, 255, 255, 0.05);
    aspect-ratio: 7 / 3;
    margin: 0 auto;
    width: min(100%, calc((100vh - 180px) * 7 / 3), 1000px);
    width: min(100%, calc((100dvh - 180px) * 7 / 3), 1000px);
    touch-action: none;
    position: relative;
    /* Hide pieces that momentarily slide past the edge while wrapping around —
       they reappear on the opposite side the instant the drag crosses the
       wrap threshold (see wrapMod() in the drag preview). */
    overflow: hidden;
  }

  /* Single bounding box around the 5 central cells — spans them as a grid item
     behind the cells. Negative margin extends it into the gap around the group
     so it visually hugs the 5 cells as a single frame. */
  .central-frame {
    grid-column: 2 / 7;
    grid-row: 2 / 3;
    margin: -7px;
    border-radius: 18px;
    border: 1.5px solid rgba(244, 201, 107, 0.8);
    background:
      linear-gradient(135deg, rgba(244, 201, 107, 0.12), rgba(139, 92, 246, 0.08));
    box-shadow:
      0 0 0 1px rgba(244, 201, 107, 0.15),
      0 0 38px var(--accent-glow),
      inset 0 0 32px rgba(244, 201, 107, 0.10);
    pointer-events: none;
    position: relative;
    z-index: 0;
    animation: frameGlow 3.4s ease-in-out infinite;
  }
  @keyframes frameGlow {
    0%, 100% {
      box-shadow:
        0 0 0 1px rgba(244, 201, 107, 0.18),
        0 0 28px rgba(244, 201, 107, 0.32),
        inset 0 0 24px rgba(244, 201, 107, 0.08);
    }
    50% {
      box-shadow:
        0 0 0 1px rgba(244, 201, 107, 0.32),
        0 0 52px rgba(244, 201, 107, 0.55),
        inset 0 0 36px rgba(244, 201, 107, 0.16);
    }
  }

  .cell {
    position: relative;
    aspect-ratio: 1;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(1.9rem, 7vw, 3.8rem);
    font-weight: 800;
    letter-spacing: -0.02em;
    user-select: none;
    transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease, background 0.2s ease;
    touch-action: none;
    z-index: 1;
    color: var(--text);
  }
  .cell.piece {
    background: linear-gradient(155deg, #2a2f4a 0%, #161a2e 100%);
    box-shadow:
      inset 0 1px 0 rgba(255, 255, 255, 0.08),
      inset 0 -1px 0 rgba(0, 0, 0, 0.4),
      0 4px 10px rgba(0, 0, 0, 0.45);
    cursor: pointer;
  }
  .cell.piece:hover {
    transform: translateY(-2px);
    filter: brightness(1.12);
    box-shadow:
      inset 0 1px 0 rgba(255, 255, 255, 0.12),
      0 10px 22px rgba(0, 0, 0, 0.55),
      0 0 24px rgba(34, 211, 238, 0.28);
  }
  .cell.empty {
    background:
      radial-gradient(ellipse at center, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.2) 70%);
    box-shadow: inset 0 4px 14px rgba(0, 0, 0, 0.7);
  }
  /* Central cells sit inside the frame — subtle accent so they read as "inside". */
  .cell.central.piece:not(.green):not(.yellow) {
    background: linear-gradient(155deg, #32385a 0%, #1a1f38 100%);
  }
  .cell.central.empty {
    background:
      radial-gradient(ellipse at center, rgba(0,0,0,0.6) 0%, rgba(20, 10, 40, 0.25) 70%);
    box-shadow: inset 0 4px 14px rgba(0, 0, 0, 0.7);
  }
  .cell.green {
    background: linear-gradient(155deg, var(--green) 0%, var(--green-2) 100%);
    color: #052e10;
    box-shadow:
      inset 0 1px 0 rgba(255, 255, 255, 0.25),
      0 6px 16px rgba(34, 197, 94, 0.38),
      0 0 22px rgba(34, 197, 94, 0.32);
  }
  .cell.yellow {
    background: linear-gradient(155deg, var(--yellow) 0%, var(--yellow-2) 100%);
    color: #2a1d04;
    box-shadow:
      inset 0 1px 0 rgba(255, 255, 255, 0.25),
      0 6px 16px rgba(234, 179, 8, 0.38),
      0 0 22px rgba(234, 179, 8, 0.32);
  }
  .cell.win-anim {
    animation: winBounce 0.75s ease;
  }
  @keyframes winBounce {
    0%, 100% { transform: translateY(0) rotate(0) scale(1); }
    20% { transform: translateY(-22px) rotate(-6deg) scale(1.1); }
    45% { transform: translateY(-28px) rotate(7deg) scale(1.18); }
    70% { transform: translateY(-12px) rotate(-3deg) scale(1.06); }
  }
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(2, 4, 10, 0.7);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }
  .overlay.show { display: flex; }
  .modal {
    background:
      linear-gradient(135deg, rgba(40, 30, 70, 0.85), rgba(12, 14, 28, 0.9));
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(244, 201, 107, 0.25);
    border-radius: 24px;
    padding: 36px 44px;
    text-align: center;
    box-shadow:
      0 30px 80px rgba(0, 0, 0, 0.6),
      0 0 50px rgba(244, 201, 107, 0.18);
    max-width: 92%;
  }
  .modal h2 {
    font-size: clamp(1.8rem, 4vw, 2.4rem);
    font-weight: 900;
    background: linear-gradient(135deg, var(--neon-a), var(--accent), var(--neon-b));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 10px;
    letter-spacing: 0.06em;
  }
  .modal p { font-size: 1rem; margin-bottom: 10px; color: var(--muted); }
  .modal .word {
    font-size: clamp(2rem, 5vw, 2.8rem);
    letter-spacing: 0.32em;
    font-weight: 900;
    background: linear-gradient(135deg, var(--green), #86efac);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin: 18px 0 26px;
  }
  .modal .word.lost {
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .confetti {
    position: fixed;
    top: -20px;
    width: 10px;
    height: 14px;
    pointer-events: none;
    z-index: 99;
    animation: fall linear forwards;
    border-radius: 2px;
  }
  @keyframes fall {
    to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  @media (max-width: 520px) {
    h1 { font-size: 1.5rem; letter-spacing: 0.22em; }
    .timer { font-size: 1.25rem; min-width: 104px; padding: 6px 14px; }
    .btn { padding: 8px 16px; font-size: 0.9rem; }
    .board { padding: 12px; gap: 7px; border-radius: 16px; }
    .cell { border-radius: 10px; }
    .central-frame { margin: -5px; border-radius: 14px; }
  }
  /* Mobile landscape — hide title, compact chrome, let the board fill. */
  @media (max-height: 500px) {
    body { padding: 6px; }
    .app { gap: 8px; }
    h1 { display: none; }
    .timer { font-size: 1.2rem; min-width: 98px; padding: 5px 14px; border-radius: 12px; }
    .btn { padding: 6px 16px; font-size: 0.9rem; border-radius: 12px; }
    .board {
      padding: 10px; gap: 6px; border-radius: 14px;
      width: min(100%, calc((100vh - 70px) * 7 / 3));
      width: min(100%, calc((100dvh - 70px) * 7 / 3));
    }
    .cell { border-radius: 9px; font-size: clamp(1.6rem, 11vh, 3rem); }
    .central-frame { margin: -4px; border-radius: 12px; }
  }
  @media (max-height: 400px) {
    .modal { padding: 18px 26px; border-radius: 18px; }
    .modal h2 { font-size: 1.4rem; margin-bottom: 6px; }
    .modal p { font-size: 0.9rem; margin-bottom: 6px; }
    .modal .word { font-size: 1.6rem; margin: 8px 0 14px; }
  }
</style>
</head>
<body>
<div class="app">
  <h1>PALABRO</h1>
  <div class="status">
    <div class="timer" id="timer">1:00</div>
    <div class="controls">
      <button class="btn icon-btn" id="fullscreenBtn" aria-label="Toggle fullscreen" title="Fullscreen">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path class="fs-enter" d="M4 9V5h4 M20 9V5h-4 M4 15v4h4 M20 15v4h-4"/>
          <path class="fs-exit"  d="M9 4v4H5 M15 4v4h4 M9 20v-4H5 M15 20v-4h4" style="display:none"/>
        </svg>
      </button>
      <button class="btn" id="newGameBtn">New Game</button>
    </div>
  </div>
  <div class="board" id="board"></div>
</div>
<div class="overlay" id="overlay">
  <div class="modal" id="modal"></div>
</div>
<script>
  const WORDS = [
    "APPLE","BEACH","BREAD","BRICK","BRUSH","CHAIR","CHARM","CHEER","CHESS","CHIEF",
    "CHILD","CLOUD","COAST","CRAFT","CRANE","CREAM","CRISP","CROWN","DANCE","DREAM",
    "DRINK","DRESS","DRIVE","EAGLE","EARTH","EIGHT","ELBOW","ENEMY","ENTRY","EQUAL",
    "EVENT","FAITH","FENCE","FIELD","FIGHT","FINAL","FIRST","FLAME","FLASH","FLEET",
    "FLOOR","FLOUR","FOCUS","FRESH","FRUIT","GIANT","GLASS","GLOBE","GRACE","GRAIN",
    "GRAND","GRAPE","GRASS","GREAT","GREEN","GUEST","HABIT","HEART","HEAVY","HONEY",
    "HONOR","HORSE","HOUSE","IDEAL","IMAGE","JUDGE","KNIFE","LEMON","LIGHT","LUNCH",
    "MAGIC","MAPLE","METAL","MONEY","MONTH","MOUSE","MUSIC","NIGHT","NOBLE","NORTH",
    "NOVEL","OCEAN","PAPER","PEACE","PLANT","PLATE","POINT","POWER","PROUD","QUICK",
    "RIVER","ROAST","ROBOT","ROUGH","ROUND","SALAD","SHAPE","SHARP","SHEET","SHIRT"
  ];

  // English letter frequency weights (percent * 10, rounded)
  const LETTER_WEIGHTS = {
    A:82,B:15,C:28,D:43,E:127,F:22,G:20,H:61,I:70,J:2,
    K:8,L:40,M:24,N:67,O:75,P:19,Q:1,R:60,S:63,T:91,
    U:28,V:10,W:24,X:2,Y:20,Z:1
  };
  const LETTER_ENTRIES = Object.entries(LETTER_WEIGHTS);
  const LETTER_TOTAL = LETTER_ENTRIES.reduce((a, [,w]) => a + w, 0);
  function weightedLetter() {
    let r = Math.random() * LETTER_TOTAL;
    for (const [L, w] of LETTER_ENTRIES) {
      r -= w;
      if (r < 0) return L;
    }
    return 'E';
  }

  const ROWS = 3, COLS = 7;
  const CENTER_ROW = 1, CENTER_COL_START = 1, CENTER_COL_END = 5;
  const TOTAL_CELLS = ROWS * COLS;
  const TIME_LIMIT = 60;       // one-minute countdown
  const SLIDE_MS = 180;        // slide animation duration

  const boardEl       = document.getElementById('board');
  const timerEl       = document.getElementById('timer');
  const overlayEl     = document.getElementById('overlay');
  const modalEl       = document.getElementById('modal');
  const newGameBtn    = document.getElementById('newGameBtn');
  const fullscreenBtn = document.getElementById('fullscreenBtn');
  const fsEnterIcon   = fullscreenBtn.querySelector('.fs-enter');
  const fsExitIcon    = fullscreenBtn.querySelector('.fs-exit');

  let state = null;
  let timerInterval = null;
  // Live DOM references — kept stable across slides so animations can flip
  // from old position to new without rebuilding the elements.
  let pieceEls = new Array(TOTAL_CELLS).fill(null);
  let frameEl  = null;
  // Global drag guard: reject secondary pointers while one drag is active.
  let activePointerId = null;

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }
  const rcToIdx = (r, c) => r * COLS + c;
  const idxToRC = (i) => ({ row: Math.floor(i / COLS), col: i % COLS });
  const isCentral = (row, col) =>
    row === CENTER_ROW && col >= CENTER_COL_START && col <= CENTER_COL_END;
  const isCentralIdx = (i) => { const { row, col } = idxToRC(i); return isCentral(row, col); };
  const wrapMod = (x, m) => ((x % m) + m) % m;

  function buildBoard(target) {
    // All 21 cells are filled — no empty slot. The 5 target letters go in random
    // positions; the remaining 16 cells get weighted-random filler letters.
    const cells = new Array(TOTAL_CELLS).fill(null);
    const positions = [];
    for (let i = 0; i < TOTAL_CELLS; i++) positions.push(i);
    shuffle(positions);
    for (let i = 0; i < 5; i++) cells[positions[i]] = target[i];
    for (let i = 5; i < TOTAL_CELLS; i++) cells[positions[i]] = weightedLetter();
    return cells;
  }

  function isSolved(cells, target) {
    for (let c = CENTER_COL_START; c <= CENTER_COL_END; c++) {
      if (cells[rcToIdx(CENTER_ROW, c)] !== target[c - CENTER_COL_START]) return false;
    }
    return true;
  }

  function newGame() {
    const target = WORDS[Math.floor(Math.random() * WORDS.length)];
    let cells = buildBoard(target);
    while (isSolved(cells, target)) cells = buildBoard(target);
    state = {
      target,
      cells,
      remaining: TIME_LIMIT,
      ended: false,
    };
    hideOverlay();
    buildBoardDOM();
    startTimer();
  }

  // Wordle-style mark-once coloring: green consumes first, then yellow against the
  // remaining pool, so duplicate guess letters can't all light up against a single
  // target letter.
  function computeCentralColors(guess, target) {
    const result = new Array(5).fill(null);
    const consumed = new Array(5).fill(false);
    for (let i = 0; i < 5; i++) {
      if (guess[i] != null && guess[i] === target[i]) {
        result[i] = 'green';
        consumed[i] = true;
      }
    }
    for (let i = 0; i < 5; i++) {
      if (result[i] || guess[i] == null) continue;
      for (let j = 0; j < 5; j++) {
        if (!consumed[j] && target[j] === guess[i]) {
          result[i] = 'yellow';
          consumed[j] = true;
          break;
        }
      }
    }
    return result;
  }

  function placeInGrid(el, idx) {
    const { row, col } = idxToRC(idx);
    el.style.gridColumn = col + 1;
    el.style.gridRow = row + 1;
    el._idx = idx;
    el.classList.toggle('central', isCentralIdx(idx));
  }

  function createPieceEl(idx, letter) {
    const el = document.createElement('div');
    el.className = 'cell piece';
    el.textContent = letter;
    placeInGrid(el, idx);
    attachDragHandlers(el);
    return el;
  }

  function buildBoardDOM() {
    boardEl.innerHTML = '';
    pieceEls = new Array(TOTAL_CELLS).fill(null);

    frameEl = document.createElement('div');
    frameEl.className = 'central-frame';
    boardEl.appendChild(frameEl);

    for (let i = 0; i < TOTAL_CELLS; i++) {
      const el = createPieceEl(i, state.cells[i]);
      boardEl.appendChild(el);
      pieceEls[i] = el;
    }
    applyCentralColors();
  }

  function applyCentralColors() {
    for (const el of pieceEls) {
      if (el) el.classList.remove('green', 'yellow');
    }
    const guess = [];
    for (let c = CENTER_COL_START; c <= CENTER_COL_END; c++) {
      guess.push(state.cells[rcToIdx(CENTER_ROW, c)]);
    }
    const colors = computeCentralColors(guess, state.target);
    for (let c = CENTER_COL_START; c <= CENTER_COL_END; c++) {
      const idx = rcToIdx(CENTER_ROW, c);
      const el = pieceEls[idx];
      if (!el) continue;
      const color = colors[c - CENTER_COL_START];
      if (color) el.classList.add(color);
    }
  }

  // ---- Circular slider: drag a row horizontally or a column vertically. ----
  // During the drag, all pieces in the affected line follow the pointer with
  // wrap-around: a piece that slides off one side immediately reappears on the
  // other via wrapMod(). On release we snap to the nearest cell step and shift
  // the row/column by that many cells.

  function attachDragHandlers(el) {
    let startX = 0, startY = 0;
    let axis = null;           // 'x' (row drag) or 'y' (column drag)
    let lineIdxs = null;       // ordered global indices of the affected row/col
    let cellStep = 0, lineLen = 0;
    let ghosts = [];           // duplicate elements at basePos ± lineLen for seamless wrap

    el.addEventListener('pointerdown', (e) => {
      if (state.ended) return;
      if (activePointerId !== null) return;
      activePointerId = e.pointerId;
      startX = e.clientX;
      startY = e.clientY;
      axis = null;
      lineIdxs = null;
      ghosts = [];
      try { el.setPointerCapture(e.pointerId); } catch {}
    });

    el.addEventListener('pointermove', (e) => {
      if (e.pointerId !== activePointerId) return;
      const dx = e.clientX - startX;
      const dy = e.clientY - startY;

      if (axis === null) {
        if (Math.hypot(dx, dy) < 6) return;
        axis = Math.abs(dx) > Math.abs(dy) ? 'x' : 'y';
        const { row, col } = idxToRC(el._idx);
        lineIdxs = [];
        if (axis === 'x') {
          for (let c = 0; c < COLS; c++) lineIdxs.push(rcToIdx(row, c));
        } else {
          for (let r = 0; r < ROWS; r++) lineIdxs.push(rcToIdx(r, col));
        }
        // Measure cell step from the two adjacent pieces in the line.
        const r0 = pieceEls[lineIdxs[0]].getBoundingClientRect();
        const r1 = pieceEls[lineIdxs[1]].getBoundingClientRect();
        cellStep = axis === 'x' ? (r1.left - r0.left) : (r1.top - r0.top);
        lineLen = lineIdxs.length * cellStep;

        // Spawn ghost twins at ±lineLen. As the drag pushes primaries off one
        // edge, the ghost on the opposite side rides into view — so a piece
        // visibly disappears off one edge and reappears on the other instead
        // of teleporting or tweening across the board.
        for (const idx of lineIdxs) {
          const piece = pieceEls[idx];
          const rc = idxToRC(idx);
          for (const sign of [-1, 1]) {
            const ghost = piece.cloneNode(true);
            ghost.classList.add('ghost');
            ghost.style.pointerEvents = 'none';
            ghost.style.gridColumn = rc.col + 1;
            ghost.style.gridRow = rc.row + 1;
            ghost._baseOffset = sign * lineLen;
            ghost.style.transition = 'none';
            ghost.style.transform = axisTransform(axis, ghost._baseOffset);
            boardEl.appendChild(ghost);
            ghosts.push(ghost);
          }
        }
      }

      const d = axis === 'x' ? dx : dy;
      // Primary pieces translate linearly — the ones at the leading edge slide
      // off the board and get clipped by overflow:hidden.
      for (const idx of lineIdxs) {
        const pEl = pieceEls[idx];
        pEl.style.transition = 'none';
        pEl.style.transform = axisTransform(axis, d);
      }
      // Ghosts ride along with the same drag offset; one side is always fully
      // off-screen while the other is entering the board.
      for (const ghost of ghosts) {
        ghost.style.transform = axisTransform(axis, ghost._baseOffset + d);
      }
    });

    const finish = (e) => {
      if (e.pointerId !== activePointerId) return;
      try { el.releasePointerCapture(e.pointerId); } catch {}
      activePointerId = null;

      if (axis === null || !lineIdxs) {
        // Never dragged far enough to lock an axis — just clean up any ghosts
        // (there shouldn't be any in this branch, but defensively) and bail.
        for (const g of ghosts) g.remove();
        ghosts = [];
        axis = null; lineIdxs = null;
        return;
      }

      const d = axis === 'x' ? (e.clientX - startX) : (e.clientY - startY);
      // Round drag distance to a whole number of cell steps. Apply a small
      // deadzone so a stray micro-drag doesn't count as a shift.
      const shift = Math.abs(d) < cellStep * 0.2 ? 0 : Math.round(d / cellStep);

      commitShift(lineIdxs, shift, axis, cellStep, lineLen, d, ghosts);
      axis = null; lineIdxs = null; ghosts = [];
    };

    el.addEventListener('pointerup', finish);
    el.addEventListener('pointercancel', finish);
  }

  function commitShift(lineIdxs, shift, axis, cellStep, lineLen, d, ghosts) {
    const n = lineIdxs.length;
    const s = wrapMod(shift, n);

    // Ghosts have served their purpose — the visible ghost on the leading
    // edge will be seamlessly "handed off" to a primary via the FLIP below.
    for (const g of ghosts) g.remove();

    // Rotate letters and piece element mapping by `s` within the line.
    const movingEls = lineIdxs.map(idx => pieceEls[idx]);
    const letters   = lineIdxs.map(idx => state.cells[idx]);
    for (let i = 0; i < n; i++) {
      const newIdx = lineIdxs[(i + s) % n];
      state.cells[newIdx] = letters[i];
      pieceEls[newIdx] = movingEls[i];
    }

    // Apply new grid positions and clear preview transforms.
    for (let i = 0; i < n; i++) {
      const pEl = movingEls[i];
      pEl.style.transition = 'none';
      pEl.style.transform = '';
      placeInGrid(pEl, lineIdxs[(i + s) % n]);
    }
    void boardEl.offsetHeight;

    // FLIP animate via the *shortest path* around the circular loop. If a
    // piece wrapped, we animate from just off the entry edge (not from its
    // far-side visual position), so pieces never traverse the whole board.
    for (let i = 0; i < n; i++) {
      const pEl = movingEls[i];
      const oldRc = idxToRC(lineIdxs[i]);
      const newRc = idxToRC(lineIdxs[(i + s) % n]);
      const basePos    = (axis === 'x' ? oldRc.col : oldRc.row) * cellStep;
      const newBasePos = (axis === 'x' ? newRc.col : newRc.row) * cellStep;
      let delta = (basePos + d) - newBasePos;
      if (delta >  lineLen / 2) delta -= lineLen;
      if (delta < -lineLen / 2) delta += lineLen;
      pEl.style.transition = '';
      if (Math.abs(delta) > 0.5) {
        pEl.animate(
          [{ transform: axisTransform(axis, delta) },
           { transform: 'translate3d(0, 0, 0)' }],
          { duration: SLIDE_MS, easing: 'cubic-bezier(0.2, 0.8, 0.2, 1)', fill: 'none' }
        );
      }
    }

    applyCentralColors();

    if (s !== 0 && isSolved(state.cells, state.target)) {
      setTimeout(winGame, SLIDE_MS);
    }
  }

  // Build a translate3d() string for the given axis / scalar offset.
  function axisTransform(axis, v) {
    return axis === 'x' ? `translate3d(${v}px, 0, 0)` : `translate3d(0, ${v}px, 0)`;
  }

  function startTimer() {
    clearInterval(timerInterval);
    updateTimerDisplay();
    timerInterval = setInterval(() => {
      state.remaining--;
      updateTimerDisplay();
      if (state.remaining <= 0) {
        clearInterval(timerInterval);
        loseGame();
      }
    }, 1000);
  }

  function updateTimerDisplay() {
    const s = Math.max(0, state.remaining);
    const m = Math.floor(s / 60);
    const sec = s % 60;
    timerEl.textContent = `${m}:${String(sec).padStart(2, '0')}`;
    timerEl.classList.toggle('warning', s <= 30 && s > 10);
    timerEl.classList.toggle('danger', s <= 10);
  }

  function winGame() {
    state.ended = true;
    clearInterval(timerInterval);
    for (let c = CENTER_COL_START; c <= CENTER_COL_END; c++) {
      const el = pieceEls[rcToIdx(CENTER_ROW, c)];
      if (el) {
        const i = c - CENTER_COL_START;
        setTimeout(() => el.classList.add('win-anim'), i * 110);
      }
    }
    launchConfetti();
    setTimeout(showWinModal, 1400);
  }

  function loseGame() {
    state.ended = true;
    // Reveal: overwrite the central row with the target word letters.
    for (let c = CENTER_COL_START; c <= CENTER_COL_END; c++) {
      state.cells[rcToIdx(CENTER_ROW, c)] = state.target[c - CENTER_COL_START];
    }
    buildBoardDOM();
    setTimeout(showLoseModal, 400);
  }

  function showWinModal() {
    const used = TIME_LIMIT - state.remaining;
    const m = Math.floor(used / 60);
    const s = used % 60;
    modalEl.innerHTML = `
      <h2>Victory!</h2>
      <div class="word">${state.target}</div>
      <p>Solved in ${m}:${String(s).padStart(2, '0')}</p>
      <button class="btn" id="playAgain">Play Again</button>
    `;
    overlayEl.classList.add('show');
    document.getElementById('playAgain').addEventListener('click', newGame);
  }

  function showLoseModal() {
    modalEl.innerHTML = `
      <h2>Time's Up!</h2>
      <p>The word was</p>
      <div class="word lost">${state.target}</div>
      <button class="btn" id="playAgain">Play Again</button>
    `;
    overlayEl.classList.add('show');
    document.getElementById('playAgain').addEventListener('click', newGame);
  }

  function hideOverlay() { overlayEl.classList.remove('show'); }

  function launchConfetti() {
    const colors = ['#8b5cf6', '#22d3ee', '#f4c96b', '#22c55e', '#f87171', '#a78bfa', '#86efac'];
    for (let i = 0; i < 90; i++) {
      const c = document.createElement('div');
      c.className = 'confetti';
      c.style.left = Math.random() * 100 + 'vw';
      c.style.background = colors[Math.floor(Math.random() * colors.length)];
      c.style.animationDelay = (Math.random() * 0.6) + 's';
      c.style.animationDuration = (2 + Math.random() * 2.2) + 's';
      c.style.transform = `rotate(${Math.random() * 360}deg)`;
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 5500);
    }
  }

  // ---- Fullscreen + PWA install plumbing ----

  function isFullscreen() {
    return !!(document.fullscreenElement || document.webkitFullscreenElement);
  }
  function enterFullscreen() {
    const el = document.documentElement;
    const req = el.requestFullscreen || el.webkitRequestFullscreen;
    if (req) { try { req.call(el); } catch {} }
  }
  function exitFullscreen() {
    const fn = document.exitFullscreen || document.webkitExitFullscreen;
    if (fn) { try { fn.call(document); } catch {} }
  }
  function toggleFullscreen() {
    if (isFullscreen()) exitFullscreen(); else enterFullscreen();
  }
  function updateFullscreenIcon() {
    const fs = isFullscreen();
    fsEnterIcon.style.display = fs ? 'none' : '';
    fsExitIcon.style.display  = fs ? ''     : 'none';
  }
  document.addEventListener('fullscreenchange', updateFullscreenIcon);
  document.addEventListener('webkitfullscreenchange', updateFullscreenIcon);
  fullscreenBtn.addEventListener('click', toggleFullscreen);

  // Auto-enter fullscreen on the first tap when we're on a landscape phone.
  // Browsers require a user gesture for this, which is why it fires from the
  // first pointerdown rather than immediately on load.
  const isLandscapePhone = () =>
    matchMedia('(max-height: 500px) and (orientation: landscape)').matches;
  document.addEventListener('pointerdown', () => {
    if (isLandscapePhone() && !isFullscreen()) enterFullscreen();
  }, { once: true });

  // Inject a PWA web app manifest so the page can be installed / added to the
  // home screen and launched standalone, fullscreen, in landscape.
  (function registerManifest() {
    const iconSvg =
      "<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'>" +
        "<defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'>" +
          "<stop offset='0' stop-color='%238b5cf6'/>" +
          "<stop offset='.55' stop-color='%23f4c96b'/>" +
          "<stop offset='1' stop-color='%2322d3ee'/>" +
        "</linearGradient></defs>" +
        "<rect width='512' height='512' rx='115' fill='%230f1222'/>" +
        "<text x='256' y='358' text-anchor='middle' " +
          "font-family='system-ui,Segoe UI,Roboto,sans-serif' " +
          "font-size='315' font-weight='900' fill='url(%23g)'>P</text>" +
      "</svg>";
    const manifest = {
      name: "Palabro",
      short_name: "Palabro",
      description: "Sliding word puzzle — guess the hidden 5-letter word.",
      start_url: ".",
      scope: "./",
      display: "fullscreen",
      display_override: ["fullscreen", "standalone", "minimal-ui"],
      orientation: "landscape",
      background_color: "#0f1222",
      theme_color: "#0f1222",
      icons: [
        { src: "data:image/svg+xml;utf8," + iconSvg, sizes: "any", type: "image/svg+xml", purpose: "any" },
        { src: "data:image/svg+xml;utf8," + iconSvg, sizes: "any", type: "image/svg+xml", purpose: "maskable" }
      ]
    };
    try {
      const blob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
      const link = document.createElement('link');
      link.rel = 'manifest';
      link.href = URL.createObjectURL(blob);
      document.head.appendChild(link);
    } catch {}
  })();

  newGameBtn.addEventListener('click', newGame);
  updateFullscreenIcon();
  newGame();
</script>
</body>
</html>
